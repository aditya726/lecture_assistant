name: Deploy Full Stack App

on:
  push:
    branches:
      - main
      
jobs:
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync static files with S3
        working-directory: ./frontend
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  deploy-backend:
    name: Deploy Backend (EC2)
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and update backend
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BACKEND_ENV_FILE
          # The script runs commands consecutively over SSH on your EC2 instance
          script: |
            # Load environment PATH so pm2, python3.11, and NVM are recognized
            source ~/.bashrc || true
            source ~/.profile || true
            export PATH=$PATH:/usr/local/bin:/usr/bin
            
            # If Node/PM2 was installed via NVM, load it:
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Change this path if your project folder is named differently
            cd ~/lecture_assistant
            
            # Pull latest changes from the repository
            git checkout main
            git pull origin main
            
            # Setup backend dependencies
            cd backend
            
            # Dynamically securely write the .env file from GitHub Secrets
            if [ -n "$BACKEND_ENV_FILE" ]; then
                echo "$BACKEND_ENV_FILE" > .env
            fi
            
            # Self-healing: Install missing host-level OS packages if pip/venv crash
            sudo apt-get update -y || true
            sudo apt-get install -y python3.11-venv python3-pip || true
            
            # Self-healing: Install Node.js/PM2 on the host if completely missing
            if ! command -v pm2 &> /dev/null && ! command -v npx &> /dev/null; then
                curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash - || true
                sudo apt-get install -y nodejs || true
                sudo npm install -g pm2 || true
            fi
            
            # Ensure Python 3.11 is used if available, otherwise fallback to python3
            PYTHON_CMD="python3"
            if command -v python3.11 &> /dev/null; then
                PYTHON_CMD="python3.11"
            fi
            
            # Create virtual environment if it doesn't exist yet
            if [ ! -d ".venv" ]; then
                $PYTHON_CMD -m venv .venv
            fi
            
            # Activate and install
            source .venv/bin/activate
            # Ensure the right python executable is targeted explicitly
            $PYTHON_CMD -m pip install -r requirements.txt
            
            # Restart backend using PM2 
            # Note: We name it 'lecture-assistant-backend' automatically if it wasn't running
            npx pm2 restart lecture-assistant-backend || npx pm2 start .venv/bin/uvicorn --name lecture-assistant-backend -- main:app --host 0.0.0.0 --port 8000
